name: Check PyPI Version

# Check to be sure `pip install klyro` installs the most recently published version.
# If dependencies get yanked, it may render the latest version uninstallable.
# See https://github.com/RavindraTirlangi/Klyro/issues for examples.

on:
  schedule:
    # Run once a day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  check_version:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install klyro
        id: install_package
        run: |
          if pip install klyro; then
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "::notice::klyro is not installable from PyPI yet; skipping version check."
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Get installed klyro version
        if: ${{ steps.install_package.outputs.installed == 'true' }}
        id: installed_version
        run: |
          set -x # Enable debugging output
          klyro_version_output=$(klyro --version)
          if [ $? -ne 0 ]; then
            echo "Error: 'klyro --version' command failed."
            exit 1
          fi
          echo "Raw klyro --version output: $klyro_version_output"

          # Extract version number (format X.Y.Z)
          version_num=$(echo "$klyro_version_output" | grep -oP '\d+\.\d+\.\d+')

          # Check if grep found anything
          if [ -z "$version_num" ]; then
            echo "Error: Could not extract version number using grep -oP '\d+\.\d+\.\d+' from output: $klyro_version_output"
            exit 1
          fi

          echo "Extracted version number: $version_num"
          echo "version=$version_num" >> $GITHUB_OUTPUT

      - name: Check out code
        if: ${{ steps.install_package.outputs.installed == 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for all tags

      - name: Get latest tag
        if: ${{ steps.install_package.outputs.installed == 'true' }}
        id: latest_tag
        run: |
          set -x # Enable debugging output
          # Fetch all tags from remote just in case
          git fetch --tags origin main
          # Get the latest tag that strictly matches vX.Y.Z (no suffixes like .dev)
          # List all tags, sort by version descending, filter for exact pattern, take the first one
          latest_tag=$(git tag --sort=-v:refname | grep -P '^v\d+\.\d+\.\d+$' | head -n 1)

          if [ -z "$latest_tag" ]; then
            echo "Error: Could not find any tags matching the pattern '^v\d+\.\d+\.\d+$'"
            exit 1
          fi

          echo "Latest non-dev tag: $latest_tag"
          # Remove 'v' prefix for comparison
          tag_num=${latest_tag#v}
          echo "Extracted tag number: $tag_num"
          echo "tag=$tag_num" >> $GITHUB_OUTPUT

      - name: Compare versions
        if: ${{ steps.install_package.outputs.installed == 'true' }}
        run: |
          echo "Installed version: ${{ steps.installed_version.outputs.version }}"
          echo "Latest tag version: ${{ steps.latest_tag.outputs.tag }}"
          if [ "${{ steps.installed_version.outputs.version }}" != "${{ steps.latest_tag.outputs.tag }}" ]; then
            echo "Error: Installed klyro version (${{ steps.installed_version.outputs.version }}) does not match the latest tag (${{ steps.latest_tag.outputs.tag }})."
            exit 1
          fi
          echo "Versions match."
